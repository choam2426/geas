name: "todo-filter-and-persistence"
goal: "기존 Todo 앱에서 사용자가 전체, 미완료, 완료 항목을 필터링하고 새로고침 후에도 할 일 목록을 유지할 수 있게 한다."
background: "현재 Todo 앱은 새로고침하면 항목이 사라지고, 목록이 길어졌을 때 완료되지 않은 항목만 확인하기 어렵다."
completion_criteria:
  - "Todo 목록 필터가 앱 화면에서 동작한다."
  - "Todo 항목과 완료 상태가 브라우저 새로고침 후에도 유지된다."
  - "기존 추가, 완료 토글, 삭제 흐름이 깨지지 않는다."
included_scope:
  - "Todo 상태 필터 UI"
  - "브라우저 localStorage 기반 Todo 저장"
  - "기존 Todo 조작 흐름 보존"
excluded_scope:
  - "로그인과 사용자별 동기화"
  - "서버 저장소"
  - "마감일, 태그, 우선순위 기능"
acceptance_criteria:
  - "User can switch between All, Active, and Completed filters and see the matching Todo items."
  - "New Todo items and completion state remain after browser reload."
  - "Delete and completion toggle still work after persistence is added."
  - "Empty filtered states are understandable to the user."
constraints:
  - "Use client-side storage only."
  - "Do not introduce a backend dependency."
  - "Keep the existing single-page Todo app structure."
assumptions:
  - "The existing app already supports adding, toggling, and deleting Todo items."
  - "The app runs in a modern browser with localStorage available."
risks:
  - "Browser storage can be cleared by the user or disabled by the environment."
  - "Invalid stored data could break initial rendering if not handled."
